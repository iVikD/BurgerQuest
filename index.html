<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BurgerQuest Dashboard">
    <meta property="og:description" content="Personal burger and food tracking dashboard with ratings, maps, and charts.">
    <meta property="og:type" content="website">
    <title>BurgerQuest Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #f59e0b;
            --muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        /* Stats & Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card h2 {
            margin: 10px 0 0 0;
            font-size: 1.8rem;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* The Map */
        #map {
            height: 450px;
            border-radius: 16px;
            margin-bottom: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* Gallery controls */
        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0 20px 0;
        }

        .gallery-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            background: var(--card);
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            width: 100%;
            max-width: 300px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        /* Burger Gallery */
        .burger-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .food-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 1px solid #334155;
        }

        .food-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .food-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #334155;
        }

        .food-img-wrapper {
            position: relative;
        }

        .participant-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            z-index: 5;
        }

        .photo-count-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 2px 8px;
            font-size: 11px;
            border-radius: 4px;
        }

        .food-img-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            color: #475569;
        }

        .food-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .food-title {
            margin: 0;
            font-size: 1.1rem;
            flex: 1;
        }

        .food-comment {
            font-size: 0.85rem;
            color: var(--muted);
            margin: 10px 0 15px 0;
            height: 2.5em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .food-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            border-top: 1px solid #334155;
            padding-top: 12px;
        }

        .food-price {
            color: var(--accent);
            font-weight: bold;
        }

        .food-date {
            color: var(--muted);
        }

        .food-info {
            padding: 20px;
        }

        .rating-badge {
            background: var(--accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.9rem;
            display: inline-block;
        }

        .participant-tag {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: white;
            margin-right: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Empty state */
        #empty-state {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        /* Leaflet Popup Fix */
        .leaflet-popup-content-wrapper {
            background: white !important;
            color: #1e293b !important;
            border-radius: 8px !important;
        }

        /* Lightbox */
        #lightbox {
            display:none;
            position:fixed;
            z-index:10000;
            top:0; left:0; width:100%; height:100%;
            background:rgba(15, 23, 42, 0.98);
            justify-content:center;
            align-items:center;
            flex-direction:column;
            backdrop-filter: blur(8px);
        }

        #lightbox-content {
            max-width:90%;
            max-height:80vh;
            display:flex;
            gap:15px;
            overflow-x:auto;
            padding:20px;
            scroll-snap-type: x mandatory;
        }

        #lightbox-content img {
            height:75vh;
            border-radius:12px;
            object-fit:contain;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            scroll-snap-align: center;
        }

        .close-btn {
            position:absolute;
            top:25px;
            right:35px;
            color:white;
            font-size:40px;
            cursor:pointer;
            line-height: 1;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }

            .gallery-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .gallery-controls {
                flex-direction: column;
            }

            .search-box {
                max-width: 100%;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            #map { height: 300px; }

            #lightbox-content {
                max-width: 100%;
                padding: 10px;
            }

            #lightbox-content img {
                height: 60vh;
                min-width: 85vw;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🍔 BurgerQuest <small id="quest-year" style="font-weight: 300; opacity: 0.6;"></small></h1>
        </header>

        <div id="empty-state">
            <h2>No meals logged yet</h2>
            <p>Start sending food photos to your Telegram chat!</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Burgers</h3>
                <h2 id="b-total">0</h2>
            </div>
            <div class="stat-card">
                <h3>Global Avg</h3>
                <h2 id="b-avg">0</h2>
            </div>
            <div class="stat-card">
                <h3>Top Hunter</h3>
                <h2 id="top-hunter">--</h2>
            </div>
            <div class="stat-card">
                <h3>Total Spent</h3>
                <h2 id="total-spent">0€</h2>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h2 style="margin-top:0">⚔️ Monthly Battle</h2>
                <canvas id="battleChart" style="max-height: 250px;"></canvas>
            </div>
            <div class="chart-container">
                <h2 style="margin-top:0">📊 Personal Avg Rating</h2>
                <canvas id="ratingChart" style="max-height: 250px;"></canvas>
            </div>
            <div class="chart-container">
                <h2 style="margin-top:0">🍕 Categories</h2>
                <canvas id="categoryChart" style="max-height: 250px;"></canvas>
            </div>
        </div>

        <div id="map"></div>

        <div class="gallery-header">
            <h2>🍔 The Burger Gallery</h2>
            <div class="gallery-controls">
                <select id="sort-select" class="search-box" style="width:auto; cursor:pointer;">
                    <option value="date-desc">Newest first</option>
                    <option value="date-asc">Oldest first</option>
                    <option value="rating-desc">Highest rated</option>
                    <option value="rating-asc">Lowest rated</option>
                    <option value="price-desc">Most expensive</option>
                    <option value="price-asc">Cheapest</option>
                </select>
                <input type="text" class="search-box" id="search-input" placeholder="Search by name, place, or comment...">
            </div>
        </div>
        <div class="burger-grid" id="burger-gallery"></div>

        <div class="gallery-header">
            <h2>🍽️ All Other Meals</h2>
        </div>
        <div class="burger-grid" id="other-gallery"></div>
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <div id="lightbox-content"></div>
        <div id="lightbox-caption" style="color:white; margin-top:20px; text-align:center; font-family:sans-serif; max-width: 800px;"></div>
    </div>

    <script>
        let allMeals = [];
        let battleChart, ratingChart, categoryChart;

        async function init() {
            try {
                const res = await fetch('./data/meals.json');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allMeals = await res.json();

                if (!Array.isArray(allMeals) || allMeals.length === 0) {
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }

                updateDashboard();

                // Setup search + sort
                document.getElementById('search-input').addEventListener('input', refreshGalleries);
                document.getElementById('sort-select').addEventListener('change', refreshGalleries);

            } catch (error) {
                console.error("Critical Error loading dashboard:", error);
                const emptyState = document.getElementById('empty-state');
                emptyState.innerHTML = '<h2>Could not load meal data</h2><p>Check the console for details.</p>';
                emptyState.style.display = 'block';
            }
        }

        function refreshGalleries() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const sortKey = document.getElementById('sort-select').value;

            const matchesSearch = (m) =>
                m.name.toLowerCase().includes(term) ||
                (m.comment && m.comment.toLowerCase().includes(term)) ||
                (m.items && m.items.some(i => i.toLowerCase().includes(term)));

            const filteredBurgers = sortMeals(allMeals.filter(m => m.is_burger && matchesSearch(m)), sortKey);
            renderGallery(filteredBurgers, 'burger-gallery');

            const filteredOther = sortMeals(allMeals.filter(m => !m.is_burger && matchesSearch(m)), sortKey);
            renderGallery(filteredOther, 'other-gallery');
        }

        function sortMeals(meals, sortKey) {
            const sorted = [...meals];
            switch(sortKey) {
                case 'date-desc': return sorted.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                case 'date-asc': return sorted.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                case 'rating-desc': return sorted.sort((a, b) => b.rating - a.rating);
                case 'rating-asc': return sorted.sort((a, b) => a.rating - b.rating);
                case 'price-desc': return sorted.sort((a, b) => (b.price || 0) - (a.price || 0));
                case 'price-asc': return sorted.sort((a, b) => (a.price || 0) - (b.price || 0));
                default: return sorted;
            }
        }

        function updateDashboard() {
            const burgers = allMeals.filter(m => m.is_burger);

            // Dynamic year from data
            const years = allMeals.map(m => new Date(m.timestamp).getFullYear());
            document.getElementById('quest-year').textContent = years.length > 0 ? Math.max(...years) : new Date().getFullYear();

            // --- Stats ---
            document.getElementById('b-total').innerText = burgers.length;
            const avg = burgers.reduce((acc, b) => acc + b.rating, 0) / (burgers.length || 1);
            document.getElementById('b-avg').innerText = avg.toFixed(1);

            const spent = allMeals.reduce((acc, m) => acc + (m.price || 0), 0);
            document.getElementById('total-spent').innerText = spent.toFixed(2) + '€';

            const userStats = {};
            allMeals.forEach(m => {
                const participants = m.participants || [m.sender];
                participants.forEach(p => {
                    if (!userStats[p]) userStats[p] = { count: 0, totalRating: 0, burgers: 0 };
                    userStats[p].count++;
                    userStats[p].totalRating += m.rating;
                    if (m.is_burger) {
                        userStats[p].burgers++;
                    }
                });
            });

            const topHunter = Object.keys(userStats).reduce((a, b) => (userStats[a]?.burgers || 0) > (userStats[b]?.burgers || 0) ? a : b, "N/A");
            document.getElementById('top-hunter').innerText = topHunter;

            // --- Charts ---
            initBattleChart(burgers);
            initRatingChart(userStats);
            initCategoryChart(allMeals);

            // --- Map ---
            initMap(allMeals);

            // --- Galleries (default sort: newest first) ---
            renderGallery(sortMeals(burgers, 'date-desc'), 'burger-gallery');
            renderGallery(sortMeals(allMeals.filter(m => !m.is_burger), 'date-desc'), 'other-gallery');
        }

        function initBattleChart(burgers) {
            const monthlyData = {};
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            burgers.forEach(b => {
                const date = new Date(b.timestamp);
                const month = months[date.getMonth()];
                const participants = b.participants || [b.sender];
                if (!monthlyData[month]) monthlyData[month] = {};
                participants.forEach(p => monthlyData[month][p] = (monthlyData[month][p] || 0) + 1);
            });

            const labels = Object.keys(monthlyData);
            const users = [...new Set(burgers.flatMap(b => b.participants || [b.sender]))];
            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e', '#06b6d4', '#84cc16'];

            const datasets = users.map((u, i) => ({
                label: u,
                data: labels.map(m => monthlyData[m][u] || 0),
                backgroundColor: colors[i % colors.length]
            }));

            if (battleChart) battleChart.destroy();
            battleChart = new Chart(document.getElementById('battleChart'), {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    plugins: { legend: { labels: { color: '#f8fafc' } } },
                    scales: {
                        x: { ticks: { color: '#f8fafc' } },
                        y: { beginAtZero: true, ticks: { color: '#f8fafc', stepSize: 1 } }
                    }
                }
            });
        }

        function initRatingChart(userStats) {
            const users = Object.keys(userStats).filter(u => userStats[u].count > 0);
            const data = users.map(u => (userStats[u].totalRating / userStats[u].count).toFixed(2));

            if (ratingChart) ratingChart.destroy();
            ratingChart = new Chart(document.getElementById('ratingChart'), {
                type: 'bar',
                data: {
                    labels: users,
                    datasets: [{
                        label: 'Avg Meal Rating',
                        data: data,
                        backgroundColor: '#f59e0b'
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#f8fafc' } },
                        y: { min: 0, max: 5, ticks: { color: '#f8fafc' } }
                    }
                }
            });
        }

        function initCategoryChart(meals) {
            const cats = {};
            meals.forEach(m => {
                const c = m.category || 'Other';
                cats[c] = (cats[c] || 0) + 1;
            });

            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{
                        data: Object.values(cats),
                        backgroundColor: ['#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e']
                    }]
                },
                options: {
                    plugins: { legend: { position: 'right', labels: { color: '#f8fafc', font: { size: 10 } } } }
                }
            });
        }

        function initMap(meals) {
            const container = L.DomUtil.get('map');
            if(container != null){ container._leaflet_id = null; }
            const map = L.map('map');
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '©OSM' }).addTo(map);

            meals.forEach(item => {
                if (item.gps?.lat) {
                    const imgHtml = item.image_path ? `<img src="${item.image_path}" style="width:120px; border-radius:4px; margin-top:8px; display:block;">` : '';
                    L.marker([item.gps.lat, item.gps.lng])
                        .addTo(map)
                        .bindPopup(`<b>${item.name}</b><br>Rating: ${item.rating}/5<br>${imgHtml}`);
                }
            });
            const points = meals.filter(i => i.gps?.lat).map(i => [i.gps.lat, i.gps.lng]);
            if (points.length > 0) {
                map.fitBounds(points, { padding: [50, 50] });
            } else {
                map.setView([40.4168, -3.7038], 11);
            }
        }

        function renderGallery(items, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            items.forEach(item => {
                const participants = item.participants || [item.sender];
                const allImages = item.image_paths || [];
                const displayImg = item.image_path || (allImages.length > 0 ? allImages[0] : null);

                const imgHtml = displayImg
                    ? `<img src="${displayImg}" class="food-img" loading="lazy">`
                    : `<div class="food-img food-img-placeholder">📸 No Photo</div>`;

                const photoBadge = allImages.length > 1 ? `<div class="photo-count-badge">+${allImages.length - 1}</div>` : '';

                const card = document.createElement('div');
                card.className = 'food-card';
                card.onclick = () => openLightbox(item);
                card.innerHTML = `
                    <div class="food-img-wrapper">
                        <div class="participant-overlay">
                            ${participants.map(p => `<span class="participant-tag">👤 ${p}</span>`).join('')}
                        </div>
                        ${photoBadge}
                        ${imgHtml}
                    </div>
                    <div class="food-info">
                        <div class="food-header">
                            <h3 class="food-title">${item.name}</h3>
                            <span class="rating-badge">${item.rating}/5</span>
                        </div>
                        <p class="food-comment">${item.comment || ''}</p>
                        <div class="food-footer">
                            <span class="food-price">${item.price > 0 ? item.price + '€' : 'Price N/A'}</span>
                            <span class="food-date">${new Date(item.timestamp).toLocaleDateString()}</span>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function openLightbox(item) {
            const container = document.getElementById('lightbox-content');
            const caption = document.getElementById('lightbox-caption');
            const lightbox = document.getElementById('lightbox');

            container.innerHTML = '';
            const images = item.image_paths?.length ? item.image_paths : (item.image_path ? [item.image_path] : []);
            images.forEach(src => container.innerHTML += `<img src="${src}">`);

            let swipeHint = '';
            if (images.length > 1) {
                swipeHint = '<p id="swipe-hint" style="color:var(--muted); font-size:0.8rem; margin-top:5px;">← Swipe to see more photos →</p>';
            }

            caption.innerHTML = `<h2 style="margin:0 0 5px 0">${item.name}</h2>
                                <p style="margin:0; opacity:0.8">${item.comment || ''}</p>
                                <div style="margin-top:10px; font-size:0.9rem; color:var(--accent)">
                                    ${item.items ? 'Items: ' + item.items.join(', ') : ''}
                                </div>${swipeHint}`;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        init();
    </script>
</body>
</html>
